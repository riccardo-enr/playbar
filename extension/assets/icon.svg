<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Now Playing</title>
  <desc id="desc">A play button above a compact status bar.</desc>
  <defs>
    <linearGradient id="background" x1="18" y1="14" x2="108" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#background)"/>

  <g filter="url(#soft-shadow)">
    <circle cx="64" cy="54" r="32" fill="#f8fbff"/>
    <path d="M56 38v32l26-16-26-16z" fill="#2563eb"/>
  </g>

  <g fill="#f8fbff" filter="url(#soft-shadow)">
    <rect x="26" y="88" width="76" height="14" rx="7"/>
    <rect x="34" y="94" width="36" height="3" rx="1.5" fill="#1e3a8a" opacity="0.5"/>
    <circle cx="91" cy="95" r="3.5" fill="#1e3a8a" opacity="0.68"/>
  </g>
</svg>
